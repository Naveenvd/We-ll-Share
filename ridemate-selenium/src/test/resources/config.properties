# ─────────────────────────────────────────────────────────
#  We'll Share — Selenium Test Configuration
# ─────────────────────────────────────────────────────────
#
#  Run against LOCAL (default):
#      mvn test
#  Run against PRODUCTION (Render):
#      mvn test -Dbase.url=https://wellshare-frontend.onrender.com
#
#  Every app.*.url below derives from base.url, so overriding base.url
#  at runtime points the whole suite at the deployed app — no file edits.
# ─────────────────────────────────────────────────────────

# Base URL — override with -Dbase.url=... (see header). All URLs build on it.
base.url=http://localhost:4200

# Application URLs (derived from base.url)
app.login.url=${base.url}/auth/login
app.signup.url=${base.url}/auth/signup
app.dashboard.url=${base.url}/dashboard
app.rides.url=${base.url}/rides
app.bookings.url=${base.url}/bookings
app.parcels.url=${base.url}/parcels
app.admin.url=${base.url}/admin/dashboard
app.profile.url=${base.url}/profile
app.bookings.my.url=${base.url}/bookings/my
app.bookings.driver.url=${base.url}/bookings/driver

# Browser settings (chrome / firefox / edge)
browser=chrome
headless=true
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Test user credentials.
# NOTE: these accounts are seeded in the LOCAL MySQL DB. The production
# Render Postgres DB starts empty (Hibernate creates tables only), so
# login-dependent tests need these users created in prod first — see
# DEPLOYMENT.md / the run notes. Override per-env with -Drider.email=... etc.
rider.email=testrider@ridemate.com
rider.password=Test@1234
driver.email=testrider@ridemate.com
driver.password=Test@1234
admin.email=admin@ridemate.com
admin.password=Admin@1234

# Reports & Screenshots
reports.path=reports/
screenshots.path=screenshots/
