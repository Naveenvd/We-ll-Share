# ─────────────────────────────────────────────────────────────
#  Production profile — activated by SPRING_PROFILES_ACTIVE=prod
#  Wired automatically by render.yaml (Render Blueprint).
#  Only MAIL_USERNAME / MAIL_PASSWORD need to be entered by hand.
# ─────────────────────────────────────────────────────────────

# ── Server ───────────────────────────────────────────────────
# Render injects $PORT; fall back to 8081 locally.
server.port=${PORT:8081}

# ── Database — Render managed PostgreSQL ─────────────────────
# render.yaml injects DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD
# from the wellshare-db database (fromDatabase). Spring assembles the
# JDBC URL from the parts, so nothing has to be pasted by hand.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Hibernate auto-detects PostgreSQLDialect from the connection — no dialect set.
spring.jpa.hibernate.ddl-auto=update

# ── JWT ──────────────────────────────────────────────────────
# JWT_SECRET is auto-generated by Render (generateValue). Property name
# MUST be expiration-ms to match JwtUtil's @Value("${app.jwt.expiration-ms}").
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS — comma-separated origins/patterns ─────────────────
# SecurityConfig + WebSocketConfig split this on commas. A *.onrender.com
# pattern lets the deployed frontend (and previews) call the API.
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# ── File uploads ─────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:/app/uploads}

# ── Email (optional — empty defaults so the app boots without them) ──
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.ridemate=INFO
