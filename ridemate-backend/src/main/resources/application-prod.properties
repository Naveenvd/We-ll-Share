# ─────────────────────────────────────────────────────────────
#  Production profile — activated by SPRING_PROFILES_ACTIVE=prod
#  All secrets come from Render.com environment variables.
#  Set these in the Render dashboard under "Environment" tab.
# ─────────────────────────────────────────────────────────────

# ── Server ───────────────────────────────────────────────────
# Render sets the PORT env var automatically
server.port=${PORT:8081}

# ── Database (use Railway.app free MySQL) ────────────────────
# Example: jdbc:mysql://containers-us-west-123.railway.app:6543/railway
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── CORS — set to your Render frontend URL ──────────────────
# Example: https://ridemate-frontend.onrender.com
app.cors.allowed-origins=${FRONTEND_URL}

# ── File uploads ─────────────────────────────────────────────
app.upload.dir=/app/uploads

# ── Email ────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.ridemate=INFO
