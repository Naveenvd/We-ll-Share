# ─────────────────────────────────────────────────────────────────
#  We'll Share — docker-compose.yml
#  Runs the FULL stack locally with one command:
#    docker-compose up
# ─────────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── MySQL Database ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: wellshare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ridemate
      MYSQL_USER: wellshare
      MYSQL_PASSWORD: wellshare123
    ports:
      - "3307:3306"        # host:3307 → container:3306 (avoids clash with local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql          # Persist DB data
      - ./ridemate_schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Auto-import schema
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wellshare-net

  # ── Spring Boot Backend ───────────────────────────────────────
  backend:
    build:
      context: ./ridemate-backend
      dockerfile: Dockerfile
    container_name: wellshare-backend
    depends_on:
      mysql:
        condition: service_healthy      # Wait for MySQL to be ready
    environment:
      # Override application.properties values at runtime
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridemate?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: wellshare
      SPRING_DATASOURCE_PASSWORD: wellshare123
      APP_JWT_SECRET: wellshare_docker_jwt_secret_key_32chars_min
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:80
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads        # Persist uploaded files
    networks:
      - wellshare-net

  # ── Angular Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./ridemate-frontend
      dockerfile: Dockerfile
    container_name: wellshare-frontend
    depends_on:
      - backend
    ports:
      - "80:80"                          # App at http://localhost
    networks:
      - wellshare-net

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mysql_data:
  uploads_data:

# ── Network ───────────────────────────────────────────────────
networks:
  wellshare-net:
    driver: bridge
