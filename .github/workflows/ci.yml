name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    name: Backend compile check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ridemate-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create placeholder application.properties
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << 'EOF'
          spring.datasource.url=jdbc:mysql://localhost:3306/ridemate
          spring.datasource.username=root
          spring.datasource.password=placeholder
          spring.jpa.hibernate.ddl-auto=none
          app.jwt.secret=ci-placeholder-secret-at-least-32-chars-long
          app.cors.allowed-origins=http://localhost:4200
          spring.mail.host=smtp.gmail.com
          spring.mail.port=587
          spring.mail.username=ci@example.com
          spring.mail.password=placeholder
          EOF

      - name: Compile (skip tests)
        run: mvn clean package -DskipTests --no-transfer-progress

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ridemate-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ridemate-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build -- --configuration=production
